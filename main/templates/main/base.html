{% load static %}

    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Shop{% endblock %}</title>
        <link rel="stylesheet" type="text/css" href="{% static 'main/css/styles.css' %}">
    </head>
    <body>

        <div class="header">
            <div class="logo-container">
                <a href="{% url 'main:home' %}">
                    <img src="{% static 'main/images/logo.png' %}" alt="Logo" class="logo">
                </a>
            </div>

            <!-- Dropdown menu -->
            <div class="dropdown">
            <button onclick="toggleDropdown()" class="dropbtn">Categories</button>
            <div id="myDropdown" class="dropdown-content">
                {% for category in categories %}
                <a href="{% url 'main:category_product_list' category_slug=category.slug %}">{{ category.name }}</a>
                {% endfor %}
            </div>
            </div>
        </div>

        {% block content %}{% endblock %}
        <script src="{% static 'main/js/dropdown.js' %}"></script>
    </body>
    </html>
