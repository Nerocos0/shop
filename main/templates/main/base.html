{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shop{% endblock %}</title>
    <link rel="stylesheet" type="text/css" href="{% static 'main/css/styles.css' %}">
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <a href="{% url 'main:home' %}">
                <img src="{% static 'main/images/logo.png' %}" alt="Logo" class="logo">
            </a>
        </div>

        <!-- Dropdown menu -->
        <div class="dropdown">
            <button onclick="toggleDropdown()" class="dropbtn">Категории</button>
            <div id="myDropdown" class="dropdown-content">
                {% for category in categories %}
                    <a href="{% url 'main:category_product_list' category_slug=category.slug %}">{{ category.name }}</a>
                {% endfor %}
            </div>
        </div>

        <div class="cart">
            <a href="{% url 'cart:cart_detail' %}">Корзина</a>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>© 2026 PiskaStore. Все права защищены.</p>
    </footer>

    <script src="{% static 'main/js/dropdown.js' %}"></script>
</body>
</html>
